<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准查新工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin: 30px 0; color: #1a73e8; }
        .input-section { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; font-family: inherit; }
        textarea:focus { outline: none; border-color: #1a73e8; }
        .hint { color: #666; font-size: 13px; margin-top: 6px; }
        .btn-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: #1a73e8; color: #fff; }
        .btn-primary:hover { background: #1557b0; }
        .btn-secondary { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
        .btn-secondary:hover { background: #e8f0fe; }
        button:disabled { background: #ccc; color: #666; cursor: not-allowed; border-color: #ccc; }
        .results-section { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .results-count { color: #666; font-size: 14px; }
        .table-wrapper { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; white-space: nowrap; }
        th:last-child, td:last-child { border-right: none; }
        th { background: #e8e8e8; font-weight: 600; color: #333; position: relative; cursor: default; user-select: none; border-bottom: 2px solid #ccc; }
        th .resize { position: absolute; right: 0; top: 0; bottom: 0; width: 6px; cursor: col-resize; background: transparent; }
        th .resize:hover { background: #1a73e8; }
        td.col-num { text-align: center; color: #999; font-size: 13px; width: 50px; }
        td.clickable { cursor: pointer; transition: background 0.15s; }
        td.clickable:hover { background: #e8f0fe !important; }
        td.copied { background: #d4edda !important; }
        tbody tr:nth-child(odd) { background: #fff; }
        tbody tr:nth-child(even) { background: #f7f9fc; }
        tbody tr:hover { background: #eef3fb; }
        .status { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: 500; }
        .status-active { background: #e6f4ea; color: #1e7e34; }
        .status-deprecated { background: #fce8e6; color: #d93025; }
        .status-upcoming { background: #e8f0fe; color: #1967d2; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #fce8e6; color: #d93025; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
        .toast.show { opacity: 1; }
        @media (max-width: 768px) {
            .container { padding: 12px; }
            table { font-size: 13px; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>标准查新工具</h1>

        <div class="input-section">
            <label for="keywords">请输入标准编号（每行一个）</label>
            <textarea id="keywords" placeholder="例如：&#10;50222&#10;50010&#10;50311"></textarea>
            <p class="hint">支持 GB、行业标准等编号，每行一个。点击表格单元格可复制内容。</p>
            <div class="btn-group">
                <button id="queryBtn" class="btn-primary" onclick="query()">开始查询</button>
                <button id="copyBtn" class="btn-secondary" onclick="copyMarkdown()" disabled>复制 Markdown</button>
            </div>
            <div class="error" id="error"></div>
        </div>

        <div class="results-section" id="results">
            <div class="results-header">
                <h2>查询结果</h2>
                <span class="results-count" id="count"></span>
            </div>
            <div class="table-wrapper">
                <table id="resultTable">
                    <thead>
                        <tr id="thead"></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="loading" id="loading" style="display:none;">查询中，请稍候...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const COLUMNS = ['查询编号', '标准编号', '规范名称', '实施状态', '发布日期', '发布部门'];
        const KEYS = ['query', 'standard_number', 'title', 'status', 'publish_date', 'publisher'];
        const PROXIES = [
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        ];
        const STD_SEARCH_URL = 'https://std.samr.gov.cn/search/std?q=';
        const BASE_URL = 'http://www.csres.com/s.jsp';
        let lastResults = [];

        function initTable() {
            const thead = document.getElementById('thead');
            thead.innerHTML = '';
            const thNum = document.createElement('th');
            thNum.textContent = '#';
            thNum.style.width = '50px';
            thNum.style.textAlign = 'center';
            thead.appendChild(thNum);

            COLUMNS.forEach((col, i) => {
                const th = document.createElement('th');
                th.textContent = col;
                th.style.width = i === 2 ? '30%' : '';
                const handle = document.createElement('div');
                handle.className = 'resize';
                handle.addEventListener('mousedown', e => startResize(e, th));
                th.appendChild(handle);
                thead.appendChild(th);
            });
        }

        let startX, startW, resizing;
        function startResize(e, th) {
            e.preventDefault();
            startX = e.clientX;
            startW = th.offsetWidth;
            resizing = th;
            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
        }
        function doResize(e) {
            if (!resizing) return;
            resizing.style.width = Math.max(60, startW + e.clientX - startX) + 'px';
        }
        function stopResize() {
            resizing = null;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }

        async function fetchWithRetry(url, retries = 2) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const resp = await fetch(url);
                    if (resp.ok) return resp;
                } catch (e) {
                    if (i === retries) throw e;
                }
                await new Promise(r => setTimeout(r, 500));
            }
            throw new Error('所有代理请求失败');
        }

        function parseResults(html, keyword) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const results = [];

            doc.querySelectorAll('tr[bgcolor="#FFFFFF"]').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                if (tds.length < 5) return;

                const titleAttr = tr.getAttribute('title') || '';
                const info = {};
                titleAttr.split('\n').forEach(line => {
                    if (line.includes('：')) {
                        const [k, ...v] = line.split('：');
                        info[k.trim()] = v.join('：').trim();
                    }
                });

                results.push({
                    query: keyword,
                    standard_number: tds[0].textContent.trim().replace(/^\s/, ''),
                    title: tds[1].textContent.trim().replace(/^\s/, ''),
                    status: tds[4].textContent.trim().replace(/^\s/, ''),
                    publisher: info['发布部门'] || '',
                    publish_date: info['发布日期'] || '',
                });
            });
            return results;
        }

        function getTotalFromHtml(html) {
            const match = html.match(/共[找到有]*?(\d+)条/);
            const total = match ? parseInt(match[1]) : 0;
            console.log('[getTotalFromHtml] match:', match, 'total:', total);
            return total;
        }

        async function queryStandard(keyword) {
            let allResults = [];
            let lastError;

            for (const proxyFn of PROXIES) {
                try {
                    allResults = [];
                    const firstUrl = `${BASE_URL}?keyword=${encodeURIComponent(keyword)}`;
                    const proxyUrl = proxyFn(firstUrl);
                    console.log('[queryStandard] page 1 url:', proxyUrl);
                    const resp = await fetchWithRetry(proxyUrl, 1);
                    const buf = await resp.arrayBuffer();
                    const html = new TextDecoder('gbk').decode(buf);

                    allResults = parseResults(html, keyword);
                    const total = getTotalFromHtml(html);
                    const pageSize = allResults.length;
                    const totalPages = pageSize > 0 ? Math.ceil(total / pageSize) : 1;
                    console.log('[queryStandard] page1 results:', pageSize, 'total:', total, 'totalPages:', totalPages);

                    for (let p = 2; p <= totalPages; p++) {
                        const pageUrl = `${BASE_URL}?keyword=${encodeURIComponent(keyword)}&pageNum=${p}`;
                        const ppUrl = proxyFn(pageUrl);
                        console.log('[queryStandard] fetching page', p, ppUrl);
                        const pageResp = await fetchWithRetry(ppUrl, 1);
                        const pageBuf = await pageResp.arrayBuffer();
                        const pageHtml = new TextDecoder('gbk').decode(pageBuf);
                        const pageResults = parseResults(pageHtml, keyword);
                        console.log('[queryStandard] page', p, 'results:', pageResults.length);
                        allResults.push(...pageResults);
                    }
                    console.log('[queryStandard] total results:', allResults.length);
                    return allResults;
                } catch (e) {
                    console.error('[queryStandard] error:', e);
                    lastError = e;
                }
            }
            return allResults;
        }

        function copyCell(td, text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                td.classList.add('copied');
                showToast('已复制: ' + (text.length > 30 ? text.substring(0, 30) + '...' : text));
                setTimeout(() => td.classList.remove('copied'), 800);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                td.classList.add('copied');
                showToast('已复制');
                setTimeout(() => td.classList.remove('copied'), 800);
            });
        }

        function renderTable(results) {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            results.forEach((r, idx) => {
                let statusClass = 'status-active';
                if (r.status === '作废' || r.status === '废止') statusClass = 'status-deprecated';
                else if (r.status === '即将实施') statusClass = 'status-upcoming';

                const tr = document.createElement('tr');
                const tdNum = document.createElement('td');
                tdNum.className = 'col-num';
                tdNum.textContent = idx + 1;
                tr.appendChild(tdNum);

                KEYS.forEach(key => {
                    const td = document.createElement('td');
                    td.className = 'clickable';
                    const val = r[key] || '';
                    if (key === 'status') {
                        td.innerHTML = `<span class="status ${statusClass}">${val}</span>`;
                        td.title = '点击复制';
                        td.addEventListener('click', () => copyCell(td, val));
                    } else if (key === 'standard_number') {
                        const a = document.createElement('a');
                        a.href = STD_SEARCH_URL + encodeURIComponent(val);
                        a.target = '_blank';
                        a.textContent = val;
                        a.style.color = '#1a73e8';
                        a.style.textDecoration = 'none';
                        a.addEventListener('click', e => e.stopPropagation());
                        td.appendChild(a);
                        td.title = '点击查看国标详情，右键复制';
                        td.addEventListener('click', () => copyCell(td, val));
                    } else {
                        td.textContent = val;
                        td.title = '点击复制';
                        td.addEventListener('click', () => copyCell(td, val));
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        async function query() {
            const text = document.getElementById('keywords').value.trim();
            const btn = document.getElementById('queryBtn');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            const loading = document.getElementById('loading');
            const count = document.getElementById('count');
            const copyBtn = document.getElementById('copyBtn');

            error.style.display = 'none';
            if (!text) {
                error.textContent = '请输入标准编号';
                error.style.display = 'block';
                return;
            }

            const keywords = text.split('\n').map(s => s.trim()).filter(Boolean);
            btn.disabled = true;
            btn.textContent = '查询中...';
            results.style.display = 'block';
            loading.style.display = 'block';
            document.getElementById('tbody').innerHTML = '';
            copyBtn.disabled = true;

            lastResults = [];
            let emptyKeywords = [];
            for (let i = 0; i < keywords.length; i++) {
                loading.textContent = `查询中 (${i + 1}/${keywords.length})...`;
                const r = await queryStandard(keywords[i]);
                if (r.length === 0) {
                    emptyKeywords.push(keywords[i]);
                }
                lastResults.push(...r);
            }

            count.textContent = `共 ${lastResults.length} 条结果`;
            if (lastResults.length === 0) {
                document.getElementById('tbody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:#999;padding:30px;">未找到任何标准信息</td></tr>`;
            } else if (emptyKeywords.length > 0) {
                showToast(`以下编号无结果: ${emptyKeywords.join(', ')}`);
            }
            renderTable(lastResults);
            loading.style.display = 'none';
            copyBtn.disabled = lastResults.length === 0;
            btn.disabled = false;
            btn.textContent = '开始查询';
        }

        function copyMarkdown() {
            if (!lastResults.length) return;

            let md = '| 序号 | ' + COLUMNS.join(' | ') + ' |\n';
            md += '| --- | ' + COLUMNS.map(() => '---').join(' | ') + ' |\n';
            lastResults.forEach((r, i) => {
                md += '| ' + (i + 1) + ' | ' + KEYS.map(k => r[k] || '').join(' | ') + ' |\n';
            });

            navigator.clipboard.writeText(md).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = md;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已复制到剪贴板');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        initTable();
    </script>
</body>
</html>
